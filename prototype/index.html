<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed the Kraken — Interactive Map Prototype</title>
  <style>
    :root{
      --bg:#070d12;
      --panel:#0f1c24;
      --panel2:#142831;
      --line:#27434e;
      --foam:#eae4d3;
      --rope:#8fa3a8;
      --pirate:#ff5555;
      --pirate-dim:#c05450;
      --kraken:#ffcc33;
      --sailor:#44aaff;
      --sailor-dim:#4e8fc7;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:
        radial-gradient(1200px 600px at 50% -200px,#14323e 0%,transparent 60%),
        var(--bg);
      color:var(--foam);
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100vh;
      padding:18px;
    }
    header{text-align:center;margin-bottom:14px}
    h1{font-size:32px;letter-spacing:1px;color:var(--kraken);text-shadow:0 0 18px rgba(255,204,51,.35)}
    .subtitle{color:var(--rope);font-size:14px;margin-top:4px}
    .game-card{
      background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      width:100%;
      max-width:1040px;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
    }
    #mapCanvas{
      width:100%;
      height:auto;
      display:block;
      border-radius:12px;
      background:radial-gradient(circle at 50% 100%,#0d1c23 0%,#050a0e 100%);
    }
    .controls{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:center;
    }
    .btn{
      border:0;border-radius:10px;padding:13px 22px;
      font-size:15px;font-weight:700;cursor:pointer;
      transition:transform .1s,box-shadow .15s,opacity .15s;
      color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35);
    }
    .btn:hover:not(:disabled){transform:translateY(-2px)}
    .btn:active:not(:disabled){transform:translateY(0)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .btn-red{background:linear-gradient(180deg,var(--pirate) 0%,#b83333 100%);box-shadow:0 6px 20px rgba(255,85,85,.25)}
    .btn-red:hover:not(:disabled){box-shadow:0 8px 26px rgba(255,85,85,.4)}
    .btn-yellow{background:linear-gradient(180deg,var(--kraken) 0%,#d9a441 100%);color:#2a1f00;box-shadow:0 6px 20px rgba(255,204,51,.2)}
    .btn-yellow:hover:not(:disabled){box-shadow:0 8px 26px rgba(255,204,51,.35)}
    .btn-blue{background:linear-gradient(180deg,var(--sailor) 0%,#2e7bc7 100%);box-shadow:0 6px 20px rgba(68,170,255,.25)}
    .btn-blue:hover:not(:disabled){box-shadow:0 8px 26px rgba(68,170,255,.4)}
    .btn-reset{background:#2a3a42;color:var(--foam);border:1px solid var(--line)}
    .status-bar{
      margin-top:12px;
      background:rgba(0,0,0,.25);
      border:1px dashed var(--line);
      border-radius:10px;
      padding:12px 16px;
      text-align:center;
      font-size:15px;
      min-height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .status-bar .pill{
      font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;
      background:rgba(255,255,255,.08);
    }
    .status-bar .pill.red{color:var(--pirate)}
    .status-bar .pill.yellow{color:var(--kraken)}
    .status-bar .pill.blue{color:var(--sailor)}
    .legend{
      margin-top:12px;
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      font-size:12px;
      color:var(--rope);
    }
    .legend-item{display:flex;align-items:center;gap:6px}
    .dot{width:10px;height:10px;border-radius:50%}
    .dot.red{background:var(--pirate);box-shadow:0 0 8px var(--pirate)}
    .dot.yellow{background:var(--kraken);box-shadow:0 0 8px var(--kraken)}
    .dot.blue{background:var(--sailor);box-shadow:0 0 8px var(--sailor)}
    .win-banner{
      display:none;
      position:fixed;inset:0;background:rgba(7,13,18,.92);
      flex-direction:column;align-items:center;justify-content:center;
      z-index:100;text-align:center;padding:20px;
    }
    .win-banner.show{display:flex}
    .win-banner h2{font-size:52px;margin-bottom:12px;text-shadow:0 0 30px currentColor}
    .win-banner p{color:var(--rope);font-size:18px;margin-bottom:22px}
    .win-banner button{padding:14px 32px;font-size:16px}
    @media(max-width:640px){
      h1{font-size:24px}
      .btn{padding:11px 14px;font-size:13px}
    }
  </style>
</head>
<body>

<header>
  <h1>🐙 Feed the Kraken</h1>
  <p class="subtitle">Interactive Map Prototype — matches the physical board layout</p>
</header>

<div class="game-card">
  <canvas id="mapCanvas" width="1000" height="780"></canvas>

  <div class="controls">
    <button id="btnRed" class="btn btn-red">⬅ Navigate Pirate (Red)</button>
    <button id="btnYellow" class="btn btn-yellow">⬆ Navigate Kraken (Yellow)</button>
    <button id="btnBlue" class="btn btn-blue">Navigate Sailor (Blue) ➡</button>
    <button id="btnReset" class="btn btn-reset">↺ Reset</button>
  </div>

  <div class="status-bar" id="status">
    <span>Ship at <b>start</b>. Choose a navigation path.</span>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="dot red"></span>Pirate Zone (x &lt; 0)</div>
    <div class="legend-item"><span class="dot yellow"></span>Kraken Zone (x = 0)</div>
    <div class="legend-item"><span class="dot blue"></span>Sailor Zone (x &gt; 0)</div>
  </div>
</div>

<div id="winBanner" class="win-banner">
  <h2 id="winTitle">🏆 Victory!</h2>
  <p id="winReason">The ship has reached its destination.</p>
  <button class="btn btn-yellow" onclick="resetGame()">Play Again</button>
</div>

<script>
  /* ============================================================
     FEED THE KRAKEN — COMPLETE MAP BACKEND & RENDERER
     Hard-coded directed graph matching the physical board image.
     Rows 1-7, horizontal offset x = -3 .. +3.
     ============================================================ */

  const CANVAS = document.getElementById('mapCanvas');
  const CTX = CANVAS.getContext('2d');

  // ---- Map topology: [1,3,5,7,7,5,3] diamond-shaped hex grid ----
  const ROW_X = {
    1: [0],
    2: [-1, 0, 1],
    3: [-2, -1, 0, 1, 2],
    4: [-3, -2, -1, 0, 1, 2, 3],
    5: [-3, -2, -1, 0, 1, 2, 3],
    6: [-2, -1, 0, 1, 2],
    7: [-1, 0, 1]
  };

  const VICTORY = {
    PIRATE: 'PIRATE_VICTORY',
    SAILOR: 'SAILOR_VICTORY',
    CULT:   'CULT_VICTORY'
  };

  const ACTION_TYPES = {
    CABIN_SEARCH:    'cabin_search',
    FEED_THE_KRAKEN: 'feed_the_kraken',
    OFF_WITH_TONGUE: 'off_with_tongue',
    FLOGGING:        'flogging'
  };

  // Action token placement exactly as shown in the image
  const ACTION_PLACEMENT = {
    'h2_-1': ACTION_TYPES.CABIN_SEARCH,
    'h2_1':  ACTION_TYPES.CABIN_SEARCH,
    'h3_0':  ACTION_TYPES.FEED_THE_KRAKEN,
    'h4_-3': ACTION_TYPES.FLOGGING,
    'h4_0':  ACTION_TYPES.FEED_THE_KRAKEN,
    'h4_3':  ACTION_TYPES.FLOGGING,
    'h5_-3': ACTION_TYPES.FLOGGING,
    'h5_0':  ACTION_TYPES.OFF_WITH_TONGUE,
    'h5_3':  ACTION_TYPES.FLOGGING
  };

  const ICONS = {
    [ACTION_TYPES.CABIN_SEARCH]:    '🔍',
    [ACTION_TYPES.FEED_THE_KRAKEN]: '🐙',
    [ACTION_TYPES.OFF_WITH_TONGUE]: '🗡️',
    [ACTION_TYPES.FLOGGING]:        '🩸'
  };

  // Hard-coded node list (no shortcuts) — 27 nodes total
  const RAW_NODES = [
    { id: 'h1_0',  row: 1, x: 0,  type: 'cult',   label: 'Start' },

    { id: 'h2_-1', row: 2, x: -1, type: 'pirate', action: ACTION_TYPES.CABIN_SEARCH },
    { id: 'h2_0',  row: 2, x: 0,  type: 'cult' },
    { id: 'h2_1',  row: 2, x: 1,  type: 'sailor', action: ACTION_TYPES.CABIN_SEARCH },

    { id: 'h3_-2', row: 3, x: -2, type: 'pirate' },
    { id: 'h3_-1', row: 3, x: -1, type: 'pirate' },
    { id: 'h3_0',  row: 3, x: 0,  type: 'cult',   action: ACTION_TYPES.FEED_THE_KRAKEN },
    { id: 'h3_1',  row: 3, x: 1,  type: 'sailor' },
    { id: 'h3_2',  row: 3, x: 2,  type: 'sailor' },

    { id: 'h4_-3', row: 4, x: -3, type: 'pirate', action: ACTION_TYPES.FLOGGING },
    { id: 'h4_-2', row: 4, x: -2, type: 'pirate' },
    { id: 'h4_-1', row: 4, x: -1, type: 'pirate' },
    { id: 'h4_0',  row: 4, x: 0,  type: 'cult',   action: ACTION_TYPES.FEED_THE_KRAKEN },
    { id: 'h4_1',  row: 4, x: 1,  type: 'sailor' },
    { id: 'h4_2',  row: 4, x: 2,  type: 'sailor' },
    { id: 'h4_3',  row: 4, x: 3,  type: 'sailor', action: ACTION_TYPES.FLOGGING },

    { id: 'h5_-3', row: 5, x: -3, type: 'pirate', action: ACTION_TYPES.FLOGGING },
    { id: 'h5_-2', row: 5, x: -2, type: 'pirate' },
    { id: 'h5_-1', row: 5, x: -1, type: 'pirate' },
    { id: 'h5_0',  row: 5, x: 0,  type: 'cult',   action: ACTION_TYPES.OFF_WITH_TONGUE },
    { id: 'h5_1',  row: 5, x: 1,  type: 'sailor' },
    { id: 'h5_2',  row: 5, x: 2,  type: 'sailor' },
    { id: 'h5_3',  row: 5, x: 3,  type: 'sailor', action: ACTION_TYPES.FLOGGING },

    { id: 'h6_-2', row: 6, x: -2, type: 'pirate' },
    { id: 'h6_-1', row: 6, x: -1, type: 'pirate' },
    { id: 'h6_0',  row: 6, x: 0,  type: 'cult' },
    { id: 'h6_1',  row: 6, x: 1,  type: 'sailor' },
    { id: 'h6_2',  row: 6, x: 2,  type: 'sailor' },

    { id: 'h7_-1', row: 7, x: -1, type: 'pirate', win: VICTORY.PIRATE },
    { id: 'h7_0',  row: 7, x: 0,  type: 'cult',   win: VICTORY.CULT },
    { id: 'h7_1',  row: 7, x: 1,  type: 'sailor', win: VICTORY.SAILOR }
  ];

  // Build node lookup and compute directed exits
  const NODES = {};
  RAW_NODES.forEach(n => { NODES[n.id] = n; });

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  function computeExits(node) {
    if (node.win) {
      return { red: node.win, yellow: node.win, blue: node.win };
    }
    const nextRow = node.row + 1;
    const nextXs = ROW_X[nextRow];
    const lo = nextXs[0], hi = nextXs[nextXs.length - 1];
    return {
      red:    `h${nextRow}_${clamp(node.x - 1, lo, hi)}`,
      yellow: `h${nextRow}_${nextXs.includes(node.x) ? node.x : clamp(node.x, lo, hi)}`,
      blue:   `h${nextRow}_${clamp(node.x + 1, lo, hi)}`
    };
  }

  RAW_NODES.forEach(n => { n.exits = computeExits(n); });

  // ---- Rendering configuration ----
  const HEX_RADIUS = 38;
  const H_SPACING  = HEX_RADIUS * 1.72;  // horizontal gap between column centres
  const V_SPACING  = HEX_RADIUS * 1.85;  // vertical gap between row centres
  const CX_CENTER  = CANVAS.width / 2;
  const CY_BOTTOM  = CANVAS.height - 70;

  const ZONE_STYLES = {
    pirate: { stroke: '#ff5555', fill: 'rgba(80,20,20,0.72)', glow: 'rgba(255,85,85,0.45)' },
    cult:   { stroke: '#ffcc33', fill: 'rgba(80,70,10,0.72)',  glow: 'rgba(255,204,51,0.4)' },
    sailor: { stroke: '#44aaff', fill: 'rgba(15,50,90,0.72)',  glow: 'rgba(68,170,255,0.45)' }
  };

  const CHOICE_COLORS = { red: '#ff5555', yellow: '#ffcc33', blue: '#44aaff' };

  // ---- Game state ----
  let state = {
    currentId: 'h1_0',
    history: [],
    winner: null,
    pulse: 0
  };

  // Convert (row, x) → pixel coordinates
  function hexPos(row, x) {
    return {
      x: CX_CENTER + x * H_SPACING,
      y: CY_BOTTOM - (row - 1) * V_SPACING
    };
  }

  // Draw one flat-top hexagon
  function drawHex(cx, cy, r, opts = {}) {
    CTX.save();
    CTX.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 180) * (60 * i);
      const px = cx + r * Math.cos(a);
      const py = cy + r * Math.sin(a);
      if (i === 0) CTX.moveTo(px, py);
      else CTX.lineTo(px, py);
    }
    CTX.closePath();

    if (opts.glow) {
      CTX.shadowColor = opts.glow;
      CTX.shadowBlur = opts.glowBlur || 18;
    }
    CTX.fillStyle = opts.fill || 'rgba(20,40,50,0.8)';
    CTX.fill();
    CTX.shadowBlur = 0;

    CTX.lineWidth = opts.lineWidth || 3;
    CTX.strokeStyle = opts.stroke || '#2c5a68';
    CTX.stroke();

    if (opts.innerStroke) {
      CTX.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 180) * (60 * i);
        const px = cx + (r - 5) * Math.cos(a);
        const py = cy + (r - 5) * Math.sin(a);
        if (i === 0) CTX.moveTo(px, py);
        else CTX.lineTo(px, py);
      }
      CTX.closePath();
      CTX.lineWidth = 1.2;
      CTX.strokeStyle = opts.innerStroke;
      CTX.stroke();
    }
    CTX.restore();
  }

  // Draw the three directional triangles on a hex (yellow up, red left, blue right)
  function drawDirTriangles(cx, cy, r) {
    CTX.save();
    CTX.lineWidth = 1;

    // Yellow — top edge
    const ty = cy - r + 10;
    CTX.fillStyle = '#ffcc33';
    CTX.beginPath();
    CTX.moveTo(cx, ty - 7);
    CTX.lineTo(cx - 5, ty);
    CTX.lineTo(cx + 5, ty);
    CTX.closePath();
    CTX.fill();

    // Red — left edge
    const lx = cx - r + 11;
    CTX.fillStyle = '#ff5555';
    CTX.beginPath();
    CTX.moveTo(lx - 6, cy - 4);
    CTX.lineTo(lx + 1, cy - 7);
    CTX.lineTo(lx + 1, cy - 1);
    CTX.closePath();
    CTX.fill();

    // Blue — right edge
    const rx = cx + r - 11;
    CTX.fillStyle = '#44aaff';
    CTX.beginPath();
    CTX.moveTo(rx + 6, cy - 4);
    CTX.lineTo(rx - 1, cy - 7);
    CTX.lineTo(rx - 1, cy - 1);
    CTX.closePath();
    CTX.fill();

    CTX.restore();
  }

  // Draw a single edge between two nodes with a given color
  function drawEdge(from, to, color, alpha = 0.18, width = 2) {
    const p1 = hexPos(from.row, from.x);
    const p2 = hexPos(to.row, to.x);
    CTX.save();
    CTX.globalAlpha = alpha;
    CTX.strokeStyle = color;
    CTX.lineWidth = width;
    CTX.lineCap = 'round';
    CTX.beginPath();
    CTX.moveTo(p1.x, p1.y);
    CTX.lineTo(p2.x, p2.y);
    CTX.stroke();
    CTX.restore();
  }

  // Main render function
  function render() {
    // Clear
    CTX.clearRect(0, 0, CANVAS.width, CANVAS.height);

    // Draw faint grid edges first (all possible moves)
    RAW_NODES.forEach(node => {
      if (node.win) return;
      ['red', 'yellow', 'blue'].forEach(color => {
        const target = NODES[node.exits[color]];
        if (target) drawEdge(node, target, CHOICE_COLORS[color], 0.10, 1.5);
      });
    });

    // Highlight outgoing edges from current node
    const current = NODES[state.currentId];
    if (current && !state.winner) {
      ['red', 'yellow', 'blue'].forEach(color => {
        const targetId = current.exits[color];
        if (targetId && NODES[targetId]) {
          drawEdge(current, NODES[targetId], CHOICE_COLORS[color], 0.55, 4);
        }
      });
    }

    // Draw victory labels above top row
    drawVictoryLabels();

    // Draw all hexes
    RAW_NODES.forEach(node => {
      const pos = hexPos(node.row, node.x);
      const isCurrent = node.id === state.currentId;
      const style = ZONE_STYLES[node.type];

      drawHex(pos.x, pos.y, HEX_RADIUS, {
        fill: style.fill,
        stroke: style.stroke,
        innerStroke: isCurrent ? '#ffffff' : style.stroke,
        glow: isCurrent ? style.glow : null,
        glowBlur: isCurrent ? 22 + Math.sin(state.pulse) * 6 : 0,
        lineWidth: isCurrent ? 4 : 2.5
      });

      // Direction triangles
      drawDirTriangles(pos.x, pos.y, HEX_RADIUS);

      // Number label
      CTX.save();
      CTX.fillStyle = '#ffffff';
      CTX.font = 'bold 18px "Segoe UI", sans-serif';
      CTX.textAlign = 'center';
      CTX.textBaseline = 'middle';
      CTX.shadowColor = 'rgba(0,0,0,0.7)';
      CTX.shadowBlur = 4;
      const label = node.label || String(node.x);
      CTX.fillText(label, pos.x, pos.y + (node.action ? -6 : 0));
      CTX.restore();

      // Action icon (special nodes)
      if (node.action) {
        const icon = node.action === ACTION_TYPES.FLOGGING
          ? (node.x < 0 ? '🩸' : '💧')
          : ICONS[node.action];
        CTX.save();
        CTX.font = '20px "Segoe UI Emoji", sans-serif';
        CTX.textAlign = 'center';
        CTX.textBaseline = 'middle';
        CTX.fillText(icon, pos.x, pos.y + 14);
        CTX.restore();
      }

      // Win indicator on final row
      if (node.win) {
        CTX.save();
        CTX.fillStyle = '#ffffff';
        CTX.font = 'bold 11px "Segoe UI", sans-serif';
        CTX.textAlign = 'center';
        CTX.textBaseline = 'middle';
        CTX.fillText('WIN', pos.x, pos.y + HEX_RADIUS - 14);
        CTX.restore();
      }
    });

    // Draw ship marker on current node
    if (current) {
      const pos = hexPos(current.row, current.x);
      CTX.save();
      CTX.font = '32px "Segoe UI Emoji", sans-serif';
      CTX.textAlign = 'center';
      CTX.textBaseline = 'middle';
      CTX.shadowColor = '#ffcc33';
      CTX.shadowBlur = 16 + Math.sin(state.pulse) * 4;
      CTX.fillText('⛵', pos.x, pos.y);
      CTX.restore();
    }

    // Side zone labels
    drawZoneLabels();
  }

  function drawVictoryLabels() {
    const topY = hexPos(7, 0).y - HEX_RADIUS - 32;
    CTX.save();
    CTX.font = 'bold 14px "Segoe UI", sans-serif';
    CTX.textAlign = 'center';
    CTX.textBaseline = 'middle';

    const left  = hexPos(7, -1);
    const mid   = hexPos(7, 0);
    const right = hexPos(7, 1);

    CTX.fillStyle = '#ff5555';
    CTX.fillText('🏴‍☠️ PIRATE VICTORY', left.x, topY);

    CTX.fillStyle = '#ffcc33';
    CTX.fillText('🐙 KRAKEN VICTORY', mid.x, topY - 22);

    CTX.fillStyle = '#44aaff';
    CTX.fillText('⚓ SAILOR VICTORY', right.x, topY);
    CTX.restore();
  }

  function drawZoneLabels() {
    CTX.save();
    CTX.font = 'bold 13px "Segoe UI", sans-serif';
    CTX.textBaseline = 'middle';

    const leftX = hexPos(4, -3).x - HEX_RADIUS - 30;
    const rightX = hexPos(4, 3).x + HEX_RADIUS + 30;
    const midY = hexPos(4, 0).y;

    CTX.fillStyle = '#ff5555';
    CTX.textAlign = 'right';
    CTX.fillText('PIRATE ZONE ⬅', leftX, midY);

    CTX.fillStyle = '#44aaff';
    CTX.textAlign = 'left';
    CTX.fillText('➡ SAILOR ZONE', rightX, midY);

    CTX.restore();
  }

  // ---- Interaction ----
  function move(choice) {
    if (state.winner) return;
    const current = NODES[state.currentId];
    const destId = current.exits[choice];

    if (!destId) {
      updateStatus(`No valid ${choice} move from here.`, 'warn');
      return;
    }

    state.history.push({ from: current.id, choice, to: destId });

    const dest = NODES[destId];
    // Win as soon as the ship steps onto a final-row hex (h7_*)
    if (dest && dest.win) {
      state.winner = dest.win;
      state.currentId = destId;
      showWin(dest.win, choice);
      updateStatus(`Ship reached the final hex via <span class="pill ${choice}">${choice}</span>. ${winnerName(dest.win)} wins!`, 'win');
    } else if (Object.values(VICTORY).includes(destId)) {
      // Fallback if exits ever resolve directly to a VICTORY constant
      state.winner = destId;
      state.currentId = current.id;
      showWin(destId, choice);
      updateStatus(`Ship reached the final hex via <span class="pill ${choice}">${choice}</span>. ${winnerName(destId)} wins!`, 'win');
    } else {
      state.currentId = destId;
      const actionText = dest.action ? ` — triggers ${dest.action.replace(/_/g, ' ')}` : '';
      updateStatus(`Moved <span class="pill ${choice}">${choice}</span> to <b>${destId}</b>${actionText}.`, 'ok');
    }

    render();
  }

  function winnerName(vic) {
    if (vic === VICTORY.PIRATE) return '🏴‍☠️ Pirates';
    if (vic === VICTORY.SAILOR) return '⚓ Sailors';
    return '🐙 Kraken Cult';
  }

  function showWin(vic, lastChoice) {
    const title = document.getElementById('winTitle');
    const reason = document.getElementById('winReason');
    const banner = document.getElementById('winBanner');

    let color = '#ffcc33';
    if (vic === VICTORY.PIRATE) color = '#ff5555';
    if (vic === VICTORY.SAILOR) color = '#44aaff';

    title.textContent = `🏆 ${winnerName(vic)} Victory!`;
    title.style.color = color;
    title.style.textShadow = `0 0 40px ${color}`;
    reason.innerHTML = `The ship arrived at the final hex using the <b style="color:${CHOICE_COLORS[lastChoice]}">${lastChoice}</b> path.`;
    banner.classList.add('show');
  }

  function updateStatus(html, type) {
    const el = document.getElementById('status');
    el.innerHTML = html;
    if (type === 'warn') el.style.borderColor = '#ff5555';
    else if (type === 'win') el.style.borderColor = '#ffcc33';
    else el.style.borderColor = 'var(--line)';
  }

  function resetGame() {
    state = { currentId: 'h1_0', history: [], winner: null, pulse: 0 };
    document.getElementById('winBanner').classList.remove('show');
    updateStatus('Ship at <b>start</b>. Choose a navigation path.', 'ok');
    render();
  }

  // ---- Animation loop ----
  function animate() {
    state.pulse += 0.08;
    render();
    requestAnimationFrame(animate);
  }

  // ---- Event bindings ----
  document.getElementById('btnRed').onclick    = () => move('red');
  document.getElementById('btnYellow').onclick = () => move('yellow');
  document.getElementById('btnBlue').onclick   = () => move('blue');
  document.getElementById('btnReset').onclick  = resetGame;

  // Keyboard shortcuts: 1/R = red, 2/Y = yellow, 3/B = blue, Esc = reset
  document.addEventListener('keydown', (e) => {
    if (state.winner) {
      if (e.key === 'Escape' || e.key === ' ') resetGame();
      return;
    }
    const key = e.key.toLowerCase();
    if (key === '1' || key === 'r' || key === 'arrowleft')  move('red');
    if (key === '2' || key === 'y' || key === 'arrowup')    move('yellow');
    if (key === '3' || key === 'b' || key === 'arrowright') move('blue');
    if (key === 'escape') resetGame();
  });

  // Start
  resetGame();
  animate();
</script>
</body>
</html>
